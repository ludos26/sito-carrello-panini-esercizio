<script>




class Carrello {

    lista = []

    add(panino){

          
         if (!this.lista.includes(panino)) 
            this.lista.push(panino)
        
    }

}


const carrello = new Carrello()

let lista = []

let result0 = document.getElementById("result0")



class panino {

    result = null

    totale = 0

    pezzi = 0

    acquisto = null

 
    constructor(id, nome, descrizione, prezzo, img) {
        
        this.id = id
        this.nome = nome
        this.descrizione = descrizione
        this.prezzo = prezzo
        this.img = img

        this.setContainer(id)

    }

    getContainer(){

        return this.result;
    
    }

   

    setContainer(id){

            this.result = document.createElement("div")

            this.result.id = "res-"+id

            let nodoTesto = document.createElement("p")

                nodoTesto.textContent = "Panino : " + this.nome + ", " + this.descrizione + ", " + this.prezzo + " eu"

                nodoTesto.id = "text-"+id

            let br = document.createElement("br")
            let nodoImg = document.createElement("img")
        
            nodoImg.src = this.img
            
            
            this.result.innerHTML =  
            '<div class="card mx-auto" style="width: 18rem;">'+
	    '<img class="card-img-top" src="'+this.img+'" alt="'+this.nome+'">'+
	    '<div class="card-body">'+
	    '<h5 class="card-title">'+nodoTesto.textContent+'</h5>'+
	    '<p id="pTxt-'+id+'" class="card-text"> ' + 'Prezzo: ' +  this.prezzo + ' eu, Pezzi: ' + this.pezzi + ', Totale: '+ this.totale + 'eu </p>'+
	    '</div>'+
	    '</div>'

            let nodoBtnAdd = document.createElement("button")

            nodoBtnAdd.id = "btnAdd-"+id

            nodoBtnAdd.textContent = "Aggiungi"

            let nodoBtnSub = document.createElement("button")

            nodoBtnSub.id = "btnSub-"+id

            nodoBtnSub.textContent = "Sottrai"

            nodoBtnAdd.addEventListener("click", () => {

                this.pezzi++
                this.totale = this.pezzi * this.prezzo;

                this.result.querySelector("#pTxt-"+id).textContent = "Prezzo: " + this.prezzo + " eu, Pezzi: " + this.pezzi + ", Totale: " + this.totale + " eu"

                carrello.add(this)
            
            })

            nodoBtnSub.addEventListener("click", () => {

                if (this.pezzi-1>=0) {

                this.pezzi--
                this.totale = this.pezzi * this.prezzo;

                this.result.querySelector("#pTxt-"+id).textContent = "Prezzo: " + this.prezzo + " eu, Pezzi " + this.pezzi + ", Totale: " + this.totale + " eu"
                
                carrello.remove(this)

                }

            })

            this.result.appendChild(nodoBtnAdd)

            this.result.appendChild(nodoBtnSub)

            this.result.appendChild(br)

            let hr = document.createElement("hr")

            this.result.appendChild(hr)


    }
    
    
}

let btnOrder = document.getElementById("btnOrder")

btnOrder.onclick = ordina

function ordina() {



    let divOrdini = document.getElementById("ordini")

    divOrdini.style = "font-size: 30px"

    let menu = document.getElementById("menu")

    menu.style.display = "none"

    divOrdini.textContent = ""

    let tot = 0;

    carrello.lista.forEach(function(el){

         if (el.totale > 0) {
        
             tot += el.totale

         let nodoOrdine = document.createElement("p")

             nodoOrdine.textContent = el.nome + " x " + el.pezzi  + " prezzo: " + el.prezzo + " EU"

             divOrdini.appendChild(nodoOrdine)
         
         }
    })

     if(tot>0) {

     menu.style.display = "block";

     let numTot = document.createElement("p")

         numTot.innerText = "Totale " + tot + " EU"

         divOrdini.appendChild(numTot)
     
     }
